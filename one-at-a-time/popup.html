<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 14px 16px;
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #0f1419;
      background: #fff;
    }
    h1 { font-size: 15px; margin: 0 0 12px; }
    h2 { font-size: 13px; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.6; }
    label.row { display: flex; align-items: center; gap: 9px; cursor: pointer; margin: 6px 0; }
    input[type="checkbox"], input[type="radio"] { width: 16px; height: 16px; accent-color: #1d9bf0; margin: 0; }
    p.hint { margin: 8px 0 0; font-size: 12px; color: #536471; }
    hr { border: none; border-top: 1px solid rgba(128,128,128,0.25); margin: 14px 0 0; }
    .field { margin: 8px 0 4px 25px; display: none; }
    .field.show { display: block; }
    input[type="color"] { width: 44px; height: 28px; padding: 0; border: 1px solid rgba(128,128,128,0.4); border-radius: 6px; background: none; cursor: pointer; vertical-align: middle; }
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 6px 8px; border: 1px solid rgba(128,128,128,0.4); border-radius: 6px; font: inherit; background: transparent; color: inherit; }
    input[type="file"] { font-size: 12px; max-width: 100%; }
    .small { font-size: 12px; opacity: 0.7; }
    button.link { background: none; border: none; color: #1d9bf0; cursor: pointer; font: inherit; padding: 0; }
    @media (prefers-color-scheme: dark) {
      body { background: #16181c; color: #e7e9ea; }
      p.hint { color: #8b98a5; }
    }
  </style>
</head>
<body>
  <h1>🎯 One at a Time</h1>

  <label class="row">
    <input type="checkbox" id="autostart" />
    <span>Start automatically on x.com</span>
  </label>
  <p class="hint">When off, use the 🎯 button in the bottom-right corner.</p>

  <hr />
  <h2>Background</h2>
  <label class="row"><input type="radio" name="bgtype" value="default" /> <span>Default (theme)</span></label>
  <label class="row"><input type="radio" name="bgtype" value="color" /> <span>Solid colour</span></label>
  <div class="field" id="field-color">
    <input type="color" id="bgcolor" value="#0f1419" />
    <span class="small" id="bgcolor-val">#0f1419</span>
  </div>
  <label class="row"><input type="radio" name="bgtype" value="image" /> <span>Image</span></label>
  <div class="field" id="field-image">
    <input type="text" id="bgurl" placeholder="Paste image URL…" />
    <p class="small" style="margin:8px 0 4px;">or <button class="link" id="pickfile">upload a file</button></p>
    <input type="file" id="bgfile" accept="image/*" style="display:none;" />
    <p class="small" id="bgimg-status"></p>
  </div>

  <p class="hint" style="margin-top:12px;"><button class="link" id="reset">Reset background to default</button></p>

  <script src="popup.js"></script>
</body>
</html>
